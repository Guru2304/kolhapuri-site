<!DOCTYPE html>
<html>
<head>
  <title>Kolhapuri Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <h2>Kolhapuri Store</h2>
  <div>Home | Shop | Cart</div>
</header>

<section class="hero">
  <h1>Premium Kolhapuri Chappals</h1>
  <p>Handcrafted • Traditional • Stylish</p>
</section>

<section class="section">
  <h2>Categories</h2>

  <div class="grid">
    <div class="card">Men</div>
    <div class="card">Women</div>
    <div class="card">Wedding</div>
    <div class="card">Premium</div>
  </div>
</section>

<section class="section">
  <h2>Products</h2>

  <div class="grid">

    <div class="card product">
      <img src="https://via.placeholder.com/200">
      <h3>Royal Brown</h3>
      <p>₹1200</p>
      <button onclick="addToCart('Royal Brown',1200)">Add</button>
    </div>

    <div class="card product">
      <img src="https://via.placeholder.com/200">
      <h3>Gold Designer</h3>
      <p>₹1800</p>
      <button onclick="addToCart('Gold Designer',1800)">Add</button>
    </div>

  </div>
</section>

<!-- CART SIDEBAR -->
<div class="cart">
  <h3>Your Cart</h3>
  <ul id="cart"></ul>
  <p>Total: ₹<span id="total">0</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
