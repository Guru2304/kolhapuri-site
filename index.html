<!DOCTYPE html>
<html>
<head>
  <title>Kolhapuri Chappal Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Kolhapuri Chappal Marketplace</h1>

  <div class="products">

    <!-- Product 1 -->
    <div class="card">
      <img src="https://via.placeholder.com/150">
      <h3>Classic Kolhapuri</h3>
      <p>₹1200</p>
      <button onclick="buyItem('Classic Kolhapuri')">Buy</button>
    </div>

    <!-- Product 2 -->
    <div class="card">
      <img src="https://via.placeholder.com/150">
      <h3>Leather Premium</h3>
      <p>₹1800</p>
      <button onclick="buyItem('Leather Premium')">Buy</button>
    </div>

  </div>

  <!-- Cart Section -->
  <h2>Your Cart</h2>
  <ul id="cart"></ul>

  <script src="script.js"></script>
</body>
</html>
