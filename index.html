<!DOCTYPE html>
<html>
<head>
  <title>Kolhapuri Chappal Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Kolhapuri Chappal Store</h1>
  <p>Authentic Handmade Collection</p>
</header>

<!-- CATEGORY 1 -->
<section class="category">
  <h2>Classic Kolhapuri</h2>
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Classic Brown</h3>
      <p>₹1200</p>
      <button onclick="addToCart('Classic Brown',1200)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Traditional Tan</h3>
      <p>₹1500</p>
      <button onclick="addToCart('Traditional Tan',1500)">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CATEGORY 2 -->
<section class="category">
  <h2>Designer Kolhapuri</h2>
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Beaded Design</h3>
      <p>₹2000</p>
      <button onclick="addToCart('Beaded Design',2000)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Wedding Style</h3>
      <p>₹2500</p>
      <button onclick="addToCart('Wedding Style',2500)">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CATEGORY 3 -->
<section class="category">
  <h2>Modern Styles</h2>
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Wedge Kolhapuri</h3>
      <p>₹1800</p>
      <button onclick="addToCart('Wedge Kolhapuri',1800)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Platform Style</h3>
      <p>₹2200</p>
      <button onclick="addToCart('Platform Style',2200)">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CART -->
<section class="cart-section">
  <h2>🛒 Your Cart</h2>
  <ul id="cart"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
</section>

<script src="script.js"></script>
</body>
</html>
