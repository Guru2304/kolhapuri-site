<!DOCTYPE html>
<html>
<head>
  <title>Kolhapuri Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <h2>Kolhapuri Store</h2>
  <div>
    <button onclick="showSection('men')">Men</button>
    <button onclick="showSection('women')">Women</button>
    <button onclick="showSection('wedding')">Wedding</button>
  </div>
</header>

<!-- MEN -->
<section id="men" class="section">
  <h2>Men Collection</h2>

  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Classic Brown</h3>
      <p>₹1200</p>
      <button onclick="addToCart('Classic Brown',1200)">Add</button>
    </div>
  </div>
</section>

<!-- WOMEN -->
<section id="women" class="section hidden">
  <h2>Women Collection</h2>

  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Gold Style</h3>
      <p>₹1800</p>
      <button onclick="addToCart('Gold Style',1800)">Add</button>
    </div>
  </div>
</section>

<!-- WEDDING -->
<section id="wedding" class="section hidden">
  <h2>Wedding Collection</h2>

  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Royal Wedding</h3>
      <p>₹2500</p>
      <button onclick="addToCart('Royal Wedding',2500)">Add</button>
    </div>
  </div>
</section>

<!-- CART -->
<section class="cart">
  <h2>Cart</h2>
  <ul id="cart"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
</section>

<script src="script.js"></script>
</body>
</html>
